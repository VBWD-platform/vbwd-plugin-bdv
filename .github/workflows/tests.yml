name: Tests

# Public-repo security posture: no `pull_request_target`, no self-hosted
# runners, no secrets used by any job — a fork PR can never reach a credential.
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — bdv (lint + unit)
    runs-on: ubuntu-latest

    steps:
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      # The on-disk dir MUST be the Python package name `bdv` — runtime imports
      # `plugins.bdv`, and the repo suffix happens to match here.
      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/bdv

      # The ENGINE is pure and needs no peers, but the chat-bridge tests exercise
      # a real seam and import bot-base's neutral DTOs. Per-plugin CI clones only
      # the plugin under test, so without this the bridge suite cannot even
      # import. Shallow clone — it is only needed for the types.
      - name: Clone peer plugin (bot_base)
        run: |
          git clone --depth=1 -q https://github.com/VBWD-platform/vbwd-plugin-bot-base.git \
            vbwd-backend/plugins/bot_base

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r vbwd-backend/requirements.txt

      - name: Style check — Black
        run: black --check --diff vbwd-backend/plugins/bdv/ --exclude='/(\.git|__pycache__|\.pytest_cache)/'

      - name: Style check — Flake8
        run: flake8 vbwd-backend/plugins/bdv/ --max-line-length=120 --extend-ignore=E203,W503 --exclude=.git,__pycache__,.pytest_cache

      - name: Style check — Mypy
        run: mypy vbwd-backend/plugins/bdv/bdv/ --ignore-missing-imports --no-error-summary --python-version=3.11 || true

      # No database: the engine is pure and the bridge tests use fakes. The
      # purity oracle in this suite proves core/ stayed dependency-free.
      - name: Run unit tests
        working-directory: vbwd-backend
        run: python -m pytest plugins/bdv/tests/unit/ -v --tb=short

  integration:
    name: Integration — bdv
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/bdv

      # bdv declares dependencies=["bot-base"], so the peer must be present or
      # the dependency gate leaves bdv disabled and `on_enable` never fires.
      #
      # ONLY bot_base. `meinchat` is deliberately NOT cloned: its migrations are
      # anchored on a `subscription` revision, so its mere presence makes alembic
      # fail building the revision map (KeyError: 20260523_1000_sub_baseline)
      # unless the whole chain is cloned too. bdv does not import meinchat — the
      # chat surface rides bot-base's provider-neutral seam — so pulling it in
      # would buy nothing and drag in three more repos.
      # bot_base itself anchors on the core revision `vbwd_001`, so it is safe.
      - name: Clone peer plugin (bot_base)
        run: |
          git clone --depth=1 -q https://github.com/VBWD-platform/vbwd-plugin-bot-base.git \
            vbwd-backend/plugins/bot_base

      # Keys MUST equal each plugin's PluginMetadata.name, not the repo suffix:
      # the manager enables by metadata.name (`bot-base`, hyphenated).
      - name: Create plugins.json (enable bdv + bot-base)
        run: |
          echo '{"plugins":{"bdv":{"enabled":true,"version":"26.7.0","source":"local"},"bot-base":{"enabled":true,"version":"26.6.1","source":"local"}}}' \
            > vbwd-backend/plugins/plugins.json

      - name: Start services
        working-directory: vbwd-backend
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/api/v1/health > /dev/null 2>&1 && break
            sleep 2
          done
          curl -sf http://localhost:5000/api/v1/health || exit 1

      # The plugin owns a root Alembic revision; heads must apply from cold.
      - name: Apply migrations
        working-directory: vbwd-backend
        run: docker compose exec -T api alembic upgrade heads

      - name: Run integration tests
        working-directory: vbwd-backend
        run: docker compose run --rm test pytest plugins/bdv/tests/integration/ -v --tb=short

      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v
